version: '3.8'

services:
  identity-service:
    build:
      context: ./services/identity-service
    ports:
      - "15001:15001"
    volumes:
      - ./services/identity-service:/app
    env_file:
      - ./services/identity-service/.env
    restart: unless-stopped

  db_booking:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: db_booking
    ports:
      - "15432:5432"
    volumes:
      - db_booking_data:/var/lib/postgresql/data
    restart: unless-stopped

  booking-service:
    build:
      context: ./services/booking-service
    ports:
      - "15003:8003"
    volumes:
      - ./services/booking-service:/app
    env_file:
      - ./services/booking-service/.env
    depends_on:
      - db_booking
    restart: unless-stopped

  mongo_chat:
    image: mongo:7
    ports:
      - "15017:27017"
    volumes:
      - mongo_chat_data:/data/db
    restart: unless-stopped

  chat-service:
    build:
      context: ./services/chat-service
    ports:
      - "15004:8004"
    volumes:
      - ./services/chat-service:/app
    env_file:
      - ./services/chat-service/.env
    depends_on:
      - mongo_chat
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "15173:15173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
    ports:
      - "15000:15000"
    depends_on:
      - identity-service
      - booking-service
      - chat-service
      - frontend
    restart: unless-stopped

volumes:
  db_booking_data:
  mongo_chat_data:
