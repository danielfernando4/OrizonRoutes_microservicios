global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "identity-service"
    static_configs:
      - targets: ["identity-service:15001"]

  - job_name: "catalog-service"
    static_configs:
      - targets: ["catalog-service:15002"]

  - job_name: "booking-service"
    static_configs:
      - targets: ["booking-service:8003"]

  - job_name: "chat-service"
    static_configs:
      - targets: ["chat-service:8004"]


