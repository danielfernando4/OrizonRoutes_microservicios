[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM", "ARG"]
ignore = ["B008", "ARG001"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["ARG002", "F401", "E501"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [".."]
asyncio_mode = "auto"
